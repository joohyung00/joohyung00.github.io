<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pages</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
max-width:820px;margin:0 auto;padding:40px 20px;color:#222}</style>
</head><body>
<h1>Pages</h1>
<!-- my-page listing widget. Substituted at write time, scoped under #mypage-list,
     fetches the manifest at runtime so new pages appear without re-editing this markup.
     NOTE: keep this file free of Liquid tokens (percent-brace forms) — when injected
     into a Jekyll page it is wrapped in a raw block, and a stray closing tag here would
     terminate that block early and break the build. -->
<div id="mypage-list">
  <div class="mp-bar">
    <input id="mp-q" type="search" placeholder="Search posts…" autocomplete="off">
    <span id="mp-count" class="mp-count"></span>
  </div>
  <ul id="mp-items" class="mp-items"></ul>
  <div id="mp-empty" class="mp-empty" hidden>No posts yet.</div>
  <div id="mp-pager" class="mp-pager"></div>
</div>

<style>
  /* Inherit the host site's fonts so the widget matches the page (form controls do
     NOT inherit font by default — that was the "alien font" in the search box). */
  #mypage-list { --mp-accent:#2a7ae2; margin: 1em 0 2em; font-family: inherit; }
  #mypage-list .mp-bar { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  #mypage-list #mp-q {
    flex:1; padding:9px 13px; font-family: inherit; font-size:15px; border:1px solid #ccc;
    border-radius:8px; outline:none;
  }
  #mypage-list #mp-q:focus { border-color: var(--mp-accent); box-shadow:0 0 0 2px rgba(42,122,226,.18); }
  #mypage-list .mp-count { color:#888; font-size:13px; white-space:nowrap; }
  #mypage-list .mp-items { list-style:none; padding:0; margin:0; }
  #mypage-list .mp-items li { padding:14px 2px; border-bottom:1px solid #eee; }
  /* titles use the site's header font (e.g. beautiful-jekyll --header-font), like native posts */
  #mypage-list .mp-items a { font-family: var(--header-font, inherit); font-size:20px; font-weight:700;
    color:var(--mp-accent); text-decoration:none; }
  #mypage-list .mp-items a:hover { text-decoration:underline; }
  #mypage-list .mp-meta { color:#999; font-size:12.5px; margin:3px 0 5px; }
  #mypage-list .mp-excerpt { color:#555; font-size:14px; line-height:1.55; margin:0; }
  #mypage-list .mp-empty { color:#999; padding:24px 0; text-align:center; }
  #mypage-list .mp-pager { display:flex; justify-content:center; gap:6px; margin-top:18px; flex-wrap:wrap; }
  #mypage-list .mp-pager button {
    min-width:34px; padding:6px 10px; border:1px solid #ddd; background:#fff; border-radius:6px;
    cursor:pointer; font-family: inherit; font-size:14px; color:#333;
  }
  #mypage-list .mp-pager button[disabled] { opacity:.4; cursor:default; }
  #mypage-list .mp-pager button.active { background:var(--mp-accent); color:#fff; border-color:var(--mp-accent); }
  #mypage-list mark { background:#fff2a8; padding:0 1px; }
</style>

<script>
(function () {
  var FOLDER = "p";
  var PER_PAGE = parseInt("10", 10) || 10;
  var root = document.getElementById("mypage-list");
  if (!root) return;
  var qEl = root.querySelector("#mp-q");
  var itemsEl = root.querySelector("#mp-items");
  var emptyEl = root.querySelector("#mp-empty");
  var pagerEl = root.querySelector("#mp-pager");
  var countEl = root.querySelector("#mp-count");

  var all = [];
  var filtered = [];
  var page = 1;

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function highlight(text, q) {
    text = esc(text);
    if (!q) return text;
    try {
      var re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
      return text.replace(re, "<mark>$1</mark>");
    } catch (e) { return text; }
  }
  function fmtDate(iso) { return iso ? String(iso).slice(0, 10) : ""; }

  function applyFilter() {
    var q = qEl.value.trim().toLowerCase();
    filtered = !q ? all.slice() : all.filter(function (p) {
      return ((p.title || "") + " " + (p.excerpt || "") + " " + (p.text || "")).toLowerCase().indexOf(q) !== -1;
    });
    page = 1;
    render();
  }

  function render() {
    var q = qEl.value.trim();
    var total = filtered.length;
    var pages = Math.max(1, Math.ceil(total / PER_PAGE));
    if (page > pages) page = pages;
    countEl.textContent = total ? (total + (total === 1 ? " post" : " posts")) : "";
    emptyEl.hidden = total !== 0;

    var start = (page - 1) * PER_PAGE;
    var slice = filtered.slice(start, start + PER_PAGE);
    itemsEl.innerHTML = slice.map(function (p) {
      return '<li><a href="' + esc(p.url) + '">' + highlight(p.title || p.slug, q) + "</a>"
        + '<div class="mp-meta">' + fmtDate(p.created)
        + (p.updated && p.updated !== p.created ? " · updated " + fmtDate(p.updated) : "") + "</div>"
        + '<p class="mp-excerpt">' + highlight((p.excerpt || "").slice(0, 180), q) + "</p></li>";
    }).join("");

    pagerEl.innerHTML = "";
    if (pages > 1) {
      var mk = function (label, p, opts) {
        opts = opts || {};
        var b = document.createElement("button");
        b.textContent = label;
        if (opts.active) b.className = "active";
        if (opts.disabled) b.disabled = true;
        else b.onclick = function () { page = p; render(); window.scrollTo({ top: root.offsetTop - 20, behavior: "smooth" }); };
        pagerEl.appendChild(b);
      };
      mk("‹", page - 1, { disabled: page === 1 });
      for (var i = 1; i <= pages; i++) mk(String(i), i, { active: i === page });
      mk("›", page + 1, { disabled: page === pages });
    }
  }

  var url = "/" + FOLDER + "/index.json?v=" + (Date.now());
  fetch(url, { cache: "no-store" })
    .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function (data) {
      all = (data.pages || []).slice().sort(function (a, b) {
        return String(b.created).localeCompare(String(a.created));
      });
      filtered = all.slice();
      render();
    })
    .catch(function (e) {
      emptyEl.hidden = false;
      emptyEl.textContent = "Couldn't load the list (" + e.message + ").";
    });

  qEl.addEventListener("input", applyFilter);
})();
</script>

</body></html>
